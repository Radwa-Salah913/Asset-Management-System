services:
  db:
      image: postgres:14.23-alpine3.24
      container_name: "darkatlas"

      environment:
         POSTGRES_USER: postgres
         POSTGRES_PASSWORD: postgres
         POSTGRES_DB: darkatlas

      ports:
         - "5432:5432"

      volumes:
       - postgres_data:/var/lib/postgresql/data

       
volumes:
  postgres_data:
   


